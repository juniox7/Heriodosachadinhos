<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Festas Exclusivas</title>
    
    <!-- Fonte Google: Outfit (Moderna e Elegante) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Ícones (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Cabeçalho -->
    <header class="header">
        <div class="header-content">
            <h1>Decorações Incríveis</h1>
            <p>Escolha o tema perfeito para transformar sua festa em um momento inesquecível.</p>
        </div>
    </header>

    <!-- Navegação em Abas -->
    <nav class="tabs-container">
        <button class="tab-btn active" data-tab="menino">
            <i class="fa-solid fa-child"></i> Meninos
        </button>
        <button class="tab-btn" data-tab="menina">
            <i class="fa-solid fa-child-dress"></i> Meninas
        </button>
        <button class="tab-btn" data-tab="cha_revelacao">
            <i class="fa-solid fa-baby-carriage"></i> Chá Revelação
        </button>
    </nav>

    <!-- Grade de Imagens (Catálogo) -->
    <main class="gallery-container">
        <!-- O conteúdo será injetado dinamicamente via script.js -->
        <div id="gallery-grid" class="gallery-grid"></div>
        
        <!-- Mensagem caso a aba esteja vazia -->
        <div id="empty-state" class="empty-state hidden">
            <i class="fa-solid fa-images"></i>
            <h3>Nenhuma decoração encontrada nesta categoria</h3>
            <p>Adicione fotos na pasta correspondente e atualize o catálogo.</p>
        </div>
    </main>

    <!-- Botão Flutuante do WhatsApp -->
    <!-- VOCÊ PODE MUDAR O NÚMERO AQUI (substitua o 5519988479061 pelo seu número com DDD, ex: 5511999999999) -->
    <a href="https://wa.me/5519988479061?text=Olá!%20Gostaria%20de%20ver%20mais%20informações%20sobre%20as%20decorações!" class="float-whatsapp" target="_blank" id="float-whatsapp">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <!-- Carrega a base de dados (que será gerada pelo Python) -->
    <script src="data.js"></script>
    
    <!-- Lógica do Catálogo -->
    <script src="script.js"></script>
</body>
</html>
